<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Greg T. Chism</title>
  <style>
    :root {
      --ink: #f3eadf;
      --muted: rgba(243, 234, 223, 0.66);
      --teal: #9fd0c2;
      --nav: rgba(243, 234, 223, 0.58);
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      min-height: 100%;
      background: #02040a;
      color: var(--ink);
      overflow-x: hidden;
    }

    .hero {
      position: relative;
      min-height: 100svh;
      overflow: hidden;
      isolation: isolate;
      background: #02040a;
    }

    #stars {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      z-index: 1;
      display: block;
    }

    /* ── Shared meteor style ────────────────────────────────────────────────── */
    /* JS sets: left, top, width, --travel-x, --travel-y, --dur, --delay       */
    .meteor {
      position: absolute;
      height: 1px;
      opacity: 0;
      z-index: 5;
      transform-origin: right center;
      background: linear-gradient(
        90deg,
        transparent                0%,
        rgba(190,215,225,.04)     16%,
        rgba(220,238,244,.55)     76%,
        rgba(255,255,255,.95)    100%
      );
      filter: drop-shadow(0 0 6px rgba(205,230,238,.45));
      animation: meteorFly var(--dur) ease-in-out var(--delay) infinite;
    }

    .meteor::after {
      content: "";
      position: absolute;
      right: -2px;
      top: -2px;
      width: 5px;
      height: 5px;
      border-radius: 999px;
      background: rgba(255,255,255,.95);
      box-shadow: 0 0 12px 2px rgba(210,238,248,.80);
    }

    @keyframes meteorFly {
      0%, 65%, 100% {
        opacity: 0;
        transform: translate3d(0,0,0) rotate(141deg) scaleX(.58);
      }
      68% { opacity: .80; }
      75% {
        opacity: 0;
        transform: translate3d(var(--travel-x), var(--travel-y), 0) rotate(141deg) scaleX(1.10);
      }
    }

    /* ── Nav ────────────────────────────────────────────────────────────────── */
    .nav {
      position: absolute;
      top: clamp(1.45rem, 3.6vw, 3rem);
      left: clamp(1.75rem, 5.5vw, 4.5rem);
      right: clamp(1.75rem, 5.5vw, 4.5rem);
      z-index: 40;
      display: flex;
      justify-content: space-between;
      align-items: center;
      color: var(--nav);
      text-transform: uppercase;
      letter-spacing: .28em;
      font-size: .62rem;
      font-weight: 650;
      font-family: ui-sans-serif, system-ui, -apple-system, sans-serif;
    }
    .nav-links { display: flex; gap: clamp(1.35rem, 3vw, 2.8rem); }
    .nav a { color: inherit; text-decoration: none; transition: color 180ms ease; }
    .nav a:hover { color: rgba(243,234,223,.94); }

    /* ── Film grain ─────────────────────────────────────────────────────────── */
    .grain {
      position: absolute;
      inset: 0;
      z-index: 20;
      pointer-events: none;
      opacity: .026;
      mix-blend-mode: screen;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 180 180' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='.88' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='180' height='180' filter='url(%23n)' opacity='.54'/%3E%3C/svg%3E");
      animation: grain 1.5s steps(2) infinite;
    }

    /* ── Vignette ───────────────────────────────────────────────────────────── */
    .vignette {
      position: absolute;
      inset: 0;
      z-index: 10;
      pointer-events: none;
      background:
        radial-gradient(ellipse at 52% 44%, transparent 0 38%, rgba(2,4,10,.10) 68%, rgba(2,4,10,.72) 100%),
        linear-gradient(90deg, rgba(1,3,8,.54), transparent 24%, transparent 74%, rgba(1,3,8,.50));
    }

    /* ── Content ────────────────────────────────────────────────────────────── */
    .content {
      position: absolute;
      z-index: 30;
      left: clamp(1.9rem, 5.9vw, 4.9rem);
      bottom: clamp(4.8rem, 10.2vh, 7.2rem);
      max-width: min(31rem, calc(100vw - 3.8rem));
    }
    .eyebrow {
      margin-bottom: 1rem;
      color: rgba(159,208,194,.84);
      font-size: .66rem;
      letter-spacing: .24em;
      text-transform: uppercase;
      font-weight: 700;
      font-family: ui-sans-serif, system-ui, -apple-system, sans-serif;
    }
    h1 {
      max-width: 16rem;
      font-family: Georgia, "Times New Roman", serif;
      font-size: clamp(3.4rem, 9.4vw, 6.85rem);
      line-height: .82;
      letter-spacing: -.067em;
      font-weight: 700;
      text-shadow: 0 1px 24px rgba(0,0,0,.60);
    }
    h1 em { color: var(--teal); font-style: italic; letter-spacing: -.075em; }
    .lede {
      margin-top: 1.35rem;
      max-width: 31rem;
      color: var(--muted);
      font-size: clamp(.86rem, 1.35vw, 1rem);
      line-height: 1.78;
      text-wrap: pretty;
      text-shadow: 0 1px 18px rgba(0,0,0,.60);
      font-family: ui-sans-serif, system-ui, -apple-system, sans-serif;
    }

    @keyframes grain {
      0%,100% { transform: translate(0,0); }
      33%      { transform: translate(-1%,1%); }
      66%      { transform: translate(1%,-1%); }
    }

    @media (max-width: 760px) {
      .nav { top:1.6rem; left:1.75rem; right:1.75rem; font-size:.54rem; letter-spacing:.22em; }
      .nav-links { gap:1rem; }
      .content { left:1.9rem; bottom:5.8rem; max-width:calc(100vw - 3.8rem); }
      .eyebrow { font-size:.56rem; }
      h1 { font-size:clamp(3.2rem,14vw,4.8rem); max-width:13.5rem; }
      .lede { max-width:20.5rem; font-size:.79rem; line-height:1.72; }
    }

    @media (prefers-reduced-motion: reduce) {
      .meteor { animation: none !important; opacity: 0 !important; }
      .grain  { animation: none !important; }
    }
  </style>
</head>
<body>
  <main class="hero" aria-label="Greg T. Chism personal site hero">
    <canvas id="stars" aria-hidden="true"></canvas>

    <nav class="nav" aria-label="Primary navigation">
      <div class="brand">Greg T. Chism</div>
      <div class="nav-links">
        <a href="#work">Work</a>
        <a href="#research">Research</a>
        <a href="#contact">Contact</a>
      </div>
    </nav>

    <div class="grain"    aria-hidden="true"></div>
    <div class="vignette" aria-hidden="true"></div>

    <section class="content">
      <p class="eyebrow">Data Scientist · Bend, OR</p>
      <h1>Greg<br />T. <em>Chism</em></h1>
      <p class="lede">Turning complex data into decisions that matter — for universities, health systems, and the communities between them.</p>
    </section>
  </main>

  <script>
  (() => {
    "use strict";

    /* ── Seeded PRNG ─────────────────────────────────────────────────────────── */
    function mulberry32(seed) {
      return () => {
        let t = seed += 0x6D2B79F5;
        t = Math.imul(t ^ t >>> 15, t | 1);
        t ^= t + Math.imul(t ^ t >>> 7, t | 61);
        return ((t ^ t >>> 14) >>> 0) / 4294967296;
      };
    }

    const TWO_PI = Math.PI * 2;

    /* ── Starfield ───────────────────────────────────────────────────────────── */
    const starCanvas = document.getElementById("stars");
    const starCtx    = starCanvas.getContext("2d", { alpha: false });

    function starColor(r) {
      const t = r();
      if (t < 0.003) return [160,185,255];
      if (t < 0.025) return [175,205,255];
      if (t < 0.085) return [215,232,255];
      if (t < 0.190) return [255,248,220];
      if (t < 0.380) return [255,228,158];
      if (t < 0.680) return [255,192,108];
      return                [255,148, 88];
    }

    function drawStarfield() {
      const dpr  = Math.min(window.devicePixelRatio || 1, 2);
      const cssW = Math.max(320, window.innerWidth);
      const cssH = Math.max(500, window.innerHeight);
      const W = Math.floor(cssW * dpr);
      const H = Math.floor(cssH * dpr);

      starCanvas.width  = W; starCanvas.height  = H;
      starCanvas.style.width  = cssW + "px";
      starCanvas.style.height = cssH + "px";

      const rand = mulberry32(0xC0DE5EED);

      const bg = starCtx.createLinearGradient(0, 0, 0, H);
      bg.addColorStop(0,   "#06091a");
      bg.addColorStop(0.5, "#040815");
      bg.addColorStop(1,   "#02040a");
      starCtx.fillStyle = bg;
      starCtx.fillRect(0, 0, W, H);

      const softGlow = (x, y, r, col, a) => {
        const g = starCtx.createRadialGradient(x, y, 0, x, y, r);
        g.addColorStop(0,    `rgba(${col},${a})`);
        g.addColorStop(0.45, `rgba(${col},${a * 0.28})`);
        g.addColorStop(1,    `rgba(${col},0)`);
        starCtx.fillStyle = g;
        starCtx.beginPath();
        starCtx.arc(x, y, r, 0, TWO_PI);
        starCtx.fill();
      };
      softGlow(W * 0.72, H * 0.18, H * 0.38, "48,58,110", 0.10);
      softGlow(W * 0.18, H * 0.80, H * 0.30, "12,44,62",  0.08);

      const mobile = cssW < 760;
      const total  = Math.floor(W * H / (mobile ? 1200 : 1800));

      for (let i = 0; i < total; i++) {
        const x   = rand() * W;
        const y   = rand() * H;
        const col = starColor(rand);
        const sz  = rand();
        const r   = sz < 0.72 ? (rand() * 0.38 + 0.12) * dpr
                  : sz < 0.96 ? (rand() * 0.55 + 0.38) * dpr
                  :             (rand() * 0.90 + 0.70) * dpr;
        const alpha = rand() * 0.55 + 0.18;

        starCtx.fillStyle = `rgba(${col[0]},${col[1]},${col[2]},${alpha})`;
        starCtx.beginPath();
        starCtx.arc(x, y, r, 0, TWO_PI);
        starCtx.fill();

        if (rand() > 0.988) {
          const gr = starCtx.createRadialGradient(x, y, 0, x, y, r * 9);
          gr.addColorStop(0, `rgba(${col[0]},${col[1]},${col[2]},${alpha * 0.18})`);
          gr.addColorStop(1, `rgba(${col[0]},${col[1]},${col[2]},0)`);
          starCtx.fillStyle = gr;
          starCtx.beginPath();
          starCtx.arc(x, y, r * 9, 0, TWO_PI);
          starCtx.fill();
        }
      }

      const shade = starCtx.createRadialGradient(W * 0.08, H * 0.88, 0, W * 0.08, H * 0.88, H * 0.38);
      shade.addColorStop(0, "rgba(2,4,10,.28)");
      shade.addColorStop(1, "rgba(2,4,10,0)");
      starCtx.fillStyle = shade;
      starCtx.fillRect(0, 0, W, H);
    }

    drawStarfield();
    let resizeTimer;
    window.addEventListener("resize", () => {
      clearTimeout(resizeTimer);
      resizeTimer = setTimeout(drawStarfield, 150);
    });

    /* ── Meteor generation ───────────────────────────────────────────────────── */
    if (window.matchMedia("(prefers-reduced-motion: reduce)").matches) return;

    const hero = document.querySelector(".hero");
    const rand = mulberry32(0xDEADC0DE);

    // Travel direction: 141° in CSS transform space.
    // sin/cos of the travel angle used to compute x/y displacement.
    const ANGLE_DEG = 141;
    const ANGLE_RAD = ANGLE_DEG * Math.PI / 180;
    // The element is already rotated 141°; travel is along its local x-axis
    // (right to left in screen space). We express the final translate in
    // screen-space px so it matches what the eye sees.
    // At 141°: moving "forward" along the bar means screen dx = -cos(41°), dy = sin(41°)
    // (141° = 180° - 39°, so the leftward-downward direction).
    const COS = Math.cos((180 - ANGLE_DEG) * Math.PI / 180); // ~0.7547
    const SIN = Math.sin((180 - ANGLE_DEG) * Math.PI / 180); // ~0.6561

    const TOTAL = 16; // total meteors
    // ~1/3–1/2 are "long" (cross most of the screen); rest are short
    const LONG_COUNT = Math.round(TOTAL * 0.40); // 6–7 long ones

    function rnd(min, max) { return min + rand() * (max - min); }
    function rndInt(min, max) { return Math.floor(rnd(min, max + 1)); }

    function createMeteors() {
      // Remove any existing meteors (e.g. on resize)
      document.querySelectorAll(".meteor").forEach(el => el.remove());

      const vw = window.innerWidth;
      const vh = window.innerHeight;

      // Stagger delays across the full pool so meteors fire at varied times,
      // with a total spread of ~20 s to avoid clumping.
      // Negative delay = CSS starts the animation mid-cycle immediately.
      // Each meteor begins at a random phase so the shower builds from frame 1
      // rather than waiting for the first delay to expire.
      const delays = Array.from({ length: TOTAL }, () => -rnd(0, 20));

      for (let i = 0; i < TOTAL; i++) {
        const isLong = i < LONG_COUNT;

        // ── Start position: random across the full viewport ─────────────────
        // Meteors travel down-left, so start anywhere on screen or just off
        // the top/right edges. Ensure they have room to travel before exiting.
        const startX = rnd(5, 95);   // % of vw
        const startY = rnd(3, 75);   // % of vh (avoid very bottom)

        // ── Travel distance ──────────────────────────────────────────────────
        // Long: travel 55–85% of viewport width in screen space.
        // Short: travel 8–22% of viewport width.
        const travelScreenPx = isLong
          ? rnd(0.55, 0.85) * vw
          : rnd(0.08, 0.22) * vw;

        // Decompose into x/y screen offsets (negative x = leftward, positive y = downward)
        const travelX = -(travelScreenPx * COS);
        const travelY =   travelScreenPx * SIN;

        // ── Bar width (visual trail length) ─────────────────────────────────
        // Long meteors get a longer trail too.
        const barWidth = isLong
          ? rnd(9, 15)   // rem
          : rnd(4, 8.5); // rem

        // ── Timing ──────────────────────────────────────────────────────────
        // Longer meteors take a bit more time to be convincing.
        const dur   = isLong ? rnd(12, 20) : rnd(9, 17);
        const delay = delays[i];

        // ── Build element ────────────────────────────────────────────────────
        const el = document.createElement("div");
        el.className = "meteor";
        el.setAttribute("aria-hidden", "true");
        el.style.cssText = `
          left: ${startX}%;
          top:  ${startY}%;
          width: ${barWidth}rem;
          --travel-x: ${travelX.toFixed(1)}px;
          --travel-y: ${travelY.toFixed(1)}px;
          --dur: ${dur.toFixed(2)}s;
          --delay: ${delay.toFixed(2)}s;
        `;
        hero.appendChild(el);
      }
    }

    createMeteors();

    // Recreate on resize so positions stay proportional
    window.addEventListener("resize", () => {
      clearTimeout(resizeTimer);
      resizeTimer = setTimeout(createMeteors, 200);
    });

  })();
  </script>
</body>
</html>
